# MiaEco 配置
# 生长/放置为异步计算，方块写入回主线程分批执行。

engine:
  # 并行计算线程数；<=0 表示自动 (CPU 核数 - 1)
  worker-threads: 0
  # 每 tick 最多写入的方块数（越大越快，但主线程压力越大）
  blocks-per-tick: 400

placement:
  # Poisson 采样最大候选点尝试次数上限（防止超大区域卡死）
  max-candidates: 20000
  # 地标古树：每棵匹配树种的树苗有此概率被升级为树库预制树（0=关闭）。
  # 地标一出场即成树、永不枯死，冠下的普通树苗会被自动清掉。
  landmark-chance: 0.05
  # 地标古树之间的最小间距（格）
  landmark-spacing: 28

# ---- 大世界地形（扩散模型推理，/miaeco world + /miaeco terra）----
terrain:
  enabled: true
  # 每原生像素的方块数 1..6（2 → 15m/块，与上游 mod 默认一致）
  scale: 2
  # 高度映射：多少米一格（越大山越矮；世界内恒定保证选区间无缝）
  vertical-meters-per-block: 40
  # 超过此 Y 渐近压扁 / 硬上限
  soft-cap-y: 250
  max-y: 300
  # 地形铺设速率（方块/tick；建造世界通常没人在场，可开大）
  blocks-per-tick: 20000
  # 选区单边上限（画布世界 terra gen；地图世界不受此限、走分片流水线）
  max-selection: 1024
  # 地图世界 size 上限（分片生成+断点续跑；10240 ≈ 4 亿方块柱，请配合 GPU/耐心）
  map-max-size: 10240
  # 过大生态区的自然切分目标（格）：超过即按噪声 Voronoi 切成 ~此大小的块
  split-cells: 90000
  # 边缘向平原画布的羽化宽度
  feather: 12
  # 生成后自动生态：分区→种树(instant)→氛围
  auto-eco: true
  eco-region-min-cells: 300
  eco-region-cap: 24
  max-eco-footprint: 480000
  # 洞穴雕刻：意面/奶酪洞（地图世界在悬浮板块内保 4 格底壳，画布世界向下雕进基岩层之上）
  caves: true
  # 陡坡崖面凹蚀（外挑岩檐的非等高观感）
  cliff-erosion: true
  # 生成后按群系自动散布地貌奇观（石林/峰林/风蚀岩/岩拱/孤石/温泉/冰塔）
  geo-features: true
  # 地图世界全局河流数量倍率（0=不出河；蜿蜒合流、源自高地入海，全图统一规划）
  rivers: 1.0
  # ONNX 推理线程数（0=自动：核数-2 给主线程留核；-1=全核；>0 指定核数）
  inference-threads: 0
  # cpu | auto | gpu：auto/gpu 会自动下载 GPU 运行时（ORT CUDA EP ~526MB +
  # NVIDIA CUDA 运行库 wheel ~1.4GB，均断点续传、SHA-256 校验，免装 CUDA Toolkit），
  # 机器需有 NVIDIA 驱动（CUDA 12.x）；auto 在不可用时自动回退 CPU
  device: cpu
  # GPU 模式自动下载 CUDA 运行库（关掉则需自装 CUDA 12 + cuDNN 9 或手放 models/cuda/）
  gpu-auto-cuda: true
  # 首次使用自动下载权重 2.2GB（分段并行+断点续传+SHA256 校验）
  download-endpoints:
    - https://hf-mirror.com
    - https://huggingface.co

# 树种默认模板；/miaeco species add 使用这些默认值，可在 forests.yml 中逐森林覆盖。
species-defaults:
  spacing: 5.0            # 树间最小间距（方块）
  density: 0.7            # 通过适宜度后的接受概率 0..1
  log-material: OAK_LOG
  leaf-material: OAK_LEAVES
  surface-whitelist: [GRASS_BLOCK, DIRT, PODZOL, COARSE_DIRT, ROOTED_DIRT, MOSS_BLOCK]
  min-y: 60
  max-y: 140
  max-slope-degrees: 35.0
  water-affinity: 0.0    # -1 喜旱, 0 无所谓, +1 喜湿
  max-water-distance: 8  # 计算 water-affinity 的有效半径（格）
  # 生长参数
  max-height: 18
  canopy-radius: 4
  branchiness: 0.6       # 0..1 分枝密度
  months-per-stage: 3    # 每个生长阶段推进所需的模拟“月数”
