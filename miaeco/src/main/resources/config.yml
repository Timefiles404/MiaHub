# MiaEco 配置
# 生长/放置为异步计算，方块写入回主线程分批执行。

engine:
  # 并行计算线程数；<=0 表示自动 (CPU 核数 - 1)
  worker-threads: 0
  # 每 tick 最多写入的方块数（越大越快，但主线程压力越大）
  blocks-per-tick: 400

placement:
  # Poisson 采样最大候选点尝试次数上限（防止超大区域卡死）
  max-candidates: 20000
  # 地标古树：每棵匹配树种的树苗有此概率被升级为树库预制树（0=关闭）。
  # 地标一出场即成树、永不枯死，冠下的普通树苗会被自动清掉。
  landmark-chance: 0.05
  # 地标古树之间的最小间距（格）
  landmark-spacing: 28

# ---- 大世界地形（扩散模型推理，/miaeco world + /miaeco terra）----
terrain:
  enabled: true
  # 每原生像素的方块数 1..6（2 → 15m/块，与上游 mod 默认一致）
  scale: 2
  # 高度映射：多少米一格（越大山越矮；世界内恒定保证选区间无缝）
  vertical-meters-per-block: 40
  # 超过此 Y 渐近压扁 / 硬上限
  soft-cap-y: 250
  max-y: 300
  # 地形铺设速率（方块/tick；建造世界通常没人在场，可开大）
  blocks-per-tick: 20000
  # 选区单边上限（1024 块 ≈ 15km 真实地貌跨度，CPU 推理约 1-3 分钟）
  max-selection: 1024
  # 边缘向平原画布的羽化宽度
  feather: 12
  # 生成后自动生态：分区→种树(instant)→氛围
  auto-eco: true
  eco-region-min-cells: 300
  eco-region-cap: 24
  max-eco-footprint: 480000
  # ONNX 推理线程数（0=全部核心；服务器建议留核给 tick，如 4）
  inference-threads: 0
  # cpu | auto | gpu（auto 依次尝试 CUDA/DirectML/CoreML 回退 CPU）
  device: cpu
  # 首次使用自动下载权重 2.2GB（分段并行+断点续传+SHA256 校验）
  download-endpoints:
    - https://hf-mirror.com
    - https://huggingface.co

# 树种默认模板；/miaeco species add 使用这些默认值，可在 forests.yml 中逐森林覆盖。
species-defaults:
  spacing: 5.0            # 树间最小间距（方块）
  density: 0.7            # 通过适宜度后的接受概率 0..1
  log-material: OAK_LOG
  leaf-material: OAK_LEAVES
  surface-whitelist: [GRASS_BLOCK, DIRT, PODZOL, COARSE_DIRT, ROOTED_DIRT, MOSS_BLOCK]
  min-y: 60
  max-y: 140
  max-slope-degrees: 35.0
  water-affinity: 0.0    # -1 喜旱, 0 无所谓, +1 喜湿
  max-water-distance: 8  # 计算 water-affinity 的有效半径（格）
  # 生长参数
  max-height: 18
  canopy-radius: 4
  branchiness: 0.6       # 0..1 分枝密度
  months-per-stage: 3    # 每个生长阶段推进所需的模拟“月数”
