    base: 0.0
    min: 0.0
    max: 100.0
  flat_reduction:
    display-name: "&9固定减伤"
    base: 0.0
    min: 0.0
    max: 1000000.0
  dodge_chance:
    display-name: "&b闪避几率%"
    base: 0.0
    min: 0.0
    max: 100.0

  # ---- 攻击 ----
  attack_damage:
    display-name: "&4附加攻击伤害"
    base: 0.0
    min: 0.0
    max: 10000000.0
  attack_power:
    display-name: "&4攻击威力%"
    base: 100.0
    min: 0.0
    max: 100000.0
  crit_chance:
    display-name: "&6暴击几率%"
    base: 5.0
    min: 0.0
    max: 100.0
  crit_damage:
    display-name: "&6暴击伤害%"
    base: 150.0
    min: 100.0
    max: 100000.0
  lifesteal:
    display-name: "&5吸血%"
    base: 0.0
    min: 0.0
    max: 1000.0

  # ---- 饱食 ----
  max_food:
    display-name: "&e最大饱食度"
    base: 100.0
    min: 1.0
    max: 1000000.0
  hunger_rate:
    display-name: "&e饥饿消耗速度%"
    base: 100.0
    min: 0.0
    max: 10000.0
  nutrition_bonus:
    display-name: "&e食物营养加成%"
    base: 100.0
    min: 0.0
    max: 10000.0

  # ---- 经验 ----
  exp_gain:
    display-name: "&2经验获取%"
    base: 100.0
    min: 0.0
    max: 100000.0

  # ---- 原版属性映射（虚拟属性 -> 原版 attribute，通过临时修饰符桥接，卸载/崩溃零残留）----
  movement_speed:
    display-name: "&f移动速度%"
    base: 100.0
    min: 0.0
