# MiaAttributes 属性注册表
#
# 每个条目注册一个属性：
#   display-name : 展示名称（支持 & 颜色代码）
#   base         : 默认基础值（玩家可被 /miattr setbase 覆盖）
#   min / max    : 最终值钳制范围（防止修饰符把数值推到非法区间）
#   vanilla      : 可选，映射到原版 attribute（按 registry key 解析，1.21.x 新旧 key 都会尝试）
#     key        : 原版 attribute key，例如 minecraft:movement_speed
#     op         : add = 修饰符加法（最终值-baseline 作为增量）；multiply = 百分比乘法（最终值/baseline 为倍率）
#     baseline   : op=add 时默认 0；op=multiply 时默认 100（即 base=100 表示 100%，120 表示 +20%）
#
# 删除条目即停用该属性（核心属性会以默认值自动补回）；新增条目即注册自定义属性，
# 自定义属性可通过 API / PlaceholderAPI / 修饰符系统直接使用。

attributes:
  # ---- 生命与防御 ----
  max_health:
    display-name: "&c最大生命值"
    base: 100.0
    min: 1.0
    max: 10000000.0
