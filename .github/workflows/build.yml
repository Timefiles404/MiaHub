name: Build

on:
  push:
    branches: [ main ]
    tags: [ "v*", "*-v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Resolve release target
        id: release
        shell: bash
        run: |
          module="all"
          tag_version=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "${tag}" == v* ]]; then
              tag_version="${tag#v}"
            elif [[ "${tag}" == *-v* ]]; then
              module="${tag%%-v*}"
              tag_version="${tag#${module}-v}"
            fi
          fi

          echo "module=${module}" >> "${GITHUB_OUTPUT}"
          echo "tag_version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Download private build dependencies
        if: steps.release.outputs.module == 'all' || steps.release.outputs.module == 'miaskillpool'
        shell: bash
        env:
          MIA_DEPS_URL: ${{ secrets.MIA_DEPS_URL }}
          MIA_DEPS_BASIC_AUTH: ${{ secrets.MIA_DEPS_BASIC_AUTH }}
        run: |
          if [[ -z "${MIA_DEPS_URL}" || -z "${MIA_DEPS_BASIC_AUTH}" ]]; then
            echo "MIA_DEPS_URL and MIA_DEPS_BASIC_AUTH repository secrets are required to build MiaSkillpool."
            exit 1
          fi

          mkdir -p ../references
          curl --fail --silent --show-error --location --retry 3 \
            --cacert .github/ci/miahub-deps-ca.pem \
            --user "${MIA_DEPS_BASIC_AUTH}" \
            "${MIA_DEPS_URL}/MythicMobsPremium-5.12.0-SNAPSHOT.jar" \
            --output ../references/MythicMobsPremium-5.12.0-SNAPSHOT.jar

      - name: Validate module release tag
        if: startsWith(github.ref, 'refs/tags/') && steps.release.outputs.module != 'all'
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          tag_version="${{ steps.release.outputs.tag_version }}"
          expected="$(gradle -q ":${module}:properties" | awk -F': ' '$1 == "version" { print $2; exit }')"

          if [[ -z "${expected}" ]]; then
            echo "Could not read Gradle version for module ${module}."
            exit 1
          fi

          if [[ "${tag_version}" != "${expected}" ]]; then
            echo "Tag version ${tag_version} does not match ${module} version ${expected}."
            exit 1
          fi

      - name: Build
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          if [[ "${module}" == "all" ]]; then
            gradle build
          else
            gradle ":${module}:build"
          fi

      - name: Generate checksums
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          if [[ "${module}" == "all" ]]; then
            find . -path "*/build/libs/*.jar" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          else
            find "${module}/build/libs" -name "*.jar" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiaPlugins
          path: |
            */build/libs/*.jar
            SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" */build/libs/*.jar SHA256SUMS.txt --generate-notes

      - name: Publish module GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          gh release create "${GITHUB_REF_NAME}" "${module}"/build/libs/*.jar SHA256SUMS.txt --generate-notes
