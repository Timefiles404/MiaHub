name: Build

on:
  push:
    branches: [ main ]
    tags: [ "v*", "*-v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Resolve release target
        id: release
        shell: bash
        run: |
          module="all"
          tag_version=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "${tag}" == v* ]]; then
              tag_version="${tag#v}"
            elif [[ "${tag}" == *-v* ]]; then
              module="${tag%%-v*}"
              tag_version="${tag#${module}-v}"
            fi
          fi

          echo "module=${module}" >> "${GITHUB_OUTPUT}"
          echo "tag_version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Download compile plugin dependencies
        shell: bash
        env:
          RELEASE_MODULE: ${{ steps.release.outputs.module }}
          PLUG_SITE_URL: ${{ secrets.PLUG_SITE_URL }}
          PLUG_SITE_DOWNLOAD_TOKEN: ${{ secrets.PLUG_SITE_DOWNLOAD_TOKEN }}
        run: |
          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys
          import urllib.parse
          import urllib.request

          module = os.environ["RELEASE_MODULE"]
          root = pathlib.Path.cwd()
          modules = [path for path in root.iterdir() if path.is_dir() and (path / "build.gradle.kts").is_file()] if module == "all" else [root / module]
          dependency_files = [path / "compile-dependencies.json" for path in modules if (path / "compile-dependencies.json").is_file()]
          if not dependency_files:
              print("No compile plugin dependencies declared.")
              raise SystemExit(0)

          base_url = os.environ.get("PLUG_SITE_URL", "").rstrip("/")
          token = os.environ.get("PLUG_SITE_DOWNLOAD_TOKEN", "")
          if not base_url or not token:
              raise SystemExit("PLUG_SITE_URL and PLUG_SITE_DOWNLOAD_TOKEN repository secrets are required for compile plugin dependencies.")

          references = root.parent / "references"
          references.mkdir(parents=True, exist_ok=True)

          def request_json(url):
              request = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}", "User-Agent": "MiaHub-CI"})
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.load(response)

          def download(url, target):
              request = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}", "User-Agent": "MiaHub-CI"})
              with urllib.request.urlopen(request, timeout=180) as response:
                  target.write_bytes(response.read())

          seen = set()
          for dependency_file in dependency_files:
              data = json.loads(dependency_file.read_text(encoding="utf-8"))
              for item in data.get("dependencies", []):
                  plugin_name = item if isinstance(item, str) else item.get("plugin")
                  if not plugin_name:
                      continue
                  key = "".join(ch for ch in plugin_name.lower() if ch.isalnum())
                  if key in seen:
                      continue
                  seen.add(key)

                  lookup_url = f"{base_url}/api/dependencies/{urllib.parse.quote(plugin_name)}"
                  artifact = request_json(lookup_url)
                  actual_name = artifact.get("pluginName") or plugin_name
                  download_url = artifact.get("downloadUrl")
                  if not download_url:
                      raise SystemExit(f"PlugSite dependency {plugin_name} has no downloadUrl.")

                  target = references / f"{actual_name}.jar"
                  download(download_url, target)
                  expected_sha256 = artifact.get("sha256")
                  if expected_sha256:
                      actual_sha256 = hashlib.sha256(target.read_bytes()).hexdigest()
                      if actual_sha256.lower() != expected_sha256.lower():
                          target.unlink(missing_ok=True)
                          raise SystemExit(f"SHA-256 mismatch for {actual_name}.")
                  print(f"Downloaded compile dependency {actual_name} -> {target.name}")
          PY

      - name: Validate module release tag
        if: startsWith(github.ref, 'refs/tags/') && steps.release.outputs.module != 'all'
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          tag_version="${{ steps.release.outputs.tag_version }}"
          expected="$(gradle -q ":${module}:properties" | awk -F': ' '$1 == "version" { print $2; exit }')"

          if [[ -z "${expected}" ]]; then
            echo "Could not read Gradle version for module ${module}."
            exit 1
          fi

          if [[ "${tag_version}" != "${expected}" ]]; then
            echo "Tag version ${tag_version} does not match ${module} version ${expected}."
            exit 1
          fi

      - name: Build
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          if [[ "${module}" == "all" ]]; then
            gradle build
          else
            gradle ":${module}:build"
          fi

      - name: Generate checksums
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          if [[ "${module}" == "all" ]]; then
            find . -path "*/build/libs/*.jar" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          else
            find "${module}/build/libs" -name "*.jar" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiaPlugins
          path: |
            */build/libs/*.jar
            SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" */build/libs/*.jar SHA256SUMS.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" */build/libs/*.jar SHA256SUMS.txt --generate-notes
          fi

      - name: Publish module GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          module="${{ steps.release.outputs.module }}"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${module}"/build/libs/*.jar SHA256SUMS.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${module}"/build/libs/*.jar SHA256SUMS.txt --generate-notes
          fi

      - name: Sync module artifact to PlugSite
        if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          PLUG_SITE_URL: ${{ secrets.PLUG_SITE_URL }}
          PLUG_SITE_UPLOAD_TOKEN: ${{ secrets.PLUG_SITE_UPLOAD_TOKEN }}
        run: |
          if [[ -z "${PLUG_SITE_URL}" || -z "${PLUG_SITE_UPLOAD_TOKEN}" ]]; then
            echo "PLUG_SITE_URL and PLUG_SITE_UPLOAD_TOKEN repository secrets are required."
            exit 1
          fi

          module="${{ steps.release.outputs.module }}"
          version="${{ steps.release.outputs.tag_version }}"
          jar="$(find "${module}/build/libs" -name "*.jar" | sort | head -n 1)"
          if [[ -z "${jar}" ]]; then
            echo "No jar found for ${module}."
            exit 1
          fi

          curl --fail --silent --show-error --location --retry 3 \
            -H "Authorization: Bearer ${PLUG_SITE_UPLOAD_TOKEN}" \
            -F "kind=mia" \
            -F "module=${module}" \
            -F "version=${version}" \
            -F "releaseTag=${GITHUB_REF_NAME}" \
            -F "repository=${GITHUB_REPOSITORY}" \
            -F "artifact=@${jar}" \
            "${PLUG_SITE_URL%/}/api/upload"
