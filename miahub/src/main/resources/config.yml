# Remote plugin catalog. MiaHub pulls PlugSite first so web uploads can enter
# the install/update flow; GitHub remains a read-only fallback.
catalog-url: "https://plug.timefiles.online/api/catalog"
catalog-fallback-url: "https://raw.githubusercontent.com/Timefiles404/MiaHub/main/catalog.json"

# Only plugins listed in the catalog can be installed, updated, uninstalled,
# enabled, or disabled by MiaHub.
manage-catalog-only: true

# Dangerous: when true and the server has been restarted, MiaHub can also
# load, enable, disable, and uninstall plugins that are not in the MiaHub
# catalog. It scans local jars in plugins/ and exposes unloaded jars in
# /miah install tab completion. Keep this false on production servers unless
# you intentionally want MiaHub to manage non-Mia plugins.
dangerous-manage-unlisted-plugins: false

# GitHub API calls are unauthenticated by default. Set this only on private
# deployments if you need a token for private repositories or higher rate limits.
github-token: ""

# MiaHub tries this download site first, then falls back to GitHub Releases.
download-site:
  enabled: true
  prefer: true
  base-url: "https://plug.timefiles.online"
  # Public bearer token used for dependency artifact downloads.
  token: "xobby"
  # Keep false by default; admins can opt in with /miah install <plugin> --deps.
  auto-install-dependencies: false

# Protect MiaHub from disabling or uninstalling itself at runtime.
protect-self: true
