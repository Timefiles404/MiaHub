<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>MiaForge Wiki</title>
  <style>
    body{margin:0;background:#f6f8fb;color:#1c2430;font:15px/1.65 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{max-width:900px;margin:0 auto;padding:42px 24px}
    h1{font-size:32px;margin:0 0 8px}h2{font-size:20px;margin:30px 0 10px}
    code,pre{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
    pre{background:#172033;color:#eef4ff;padding:16px;border-radius:8px;overflow:auto}
    section{background:white;border:1px solid #dfe6f0;border-radius:8px;padding:22px;margin-top:18px}
  </style>
</head>
<body>
<main>
  <h1>MiaForge</h1>
  <p>MiaForge 是 Mia 系列的测试插件，用于验证 MiaHub 的安装、更新、启用、禁用和重载流程。</p>

  <section>
    <h2>命令</h2>
    <pre>/miaf reload</pre>
    <p>重新加载 MiaForge 配置。需要权限 <code>miaforge.reload</code>。</p>
  </section>

  <section>
    <h2>文件</h2>
    <p>插件首次启动会释放默认配置和本页面：</p>
    <pre>plugins/MiaForge/config.yml
plugins/MiaForge/wiki.html</pre>
  </section>
</main>
</body>
</html>
