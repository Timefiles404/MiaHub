<body>
  <h1>MiaLimitation</h1>
  <p>Item expiration management plugin.</p>
  <ul>
    <li><code>/mialimit end &lt;year&gt;y&lt;month&gt;m&lt;day&gt;d</code></li>
    <li><code>/mialimit duration &lt;number&gt;&lt;h|d|m|y&gt;</code></li>
    <li><code>/mialimit reload</code></li>
  </ul>
</body>
